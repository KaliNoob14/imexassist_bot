steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "europe-west1-docker.pkg.dev/imexassist-bot/imex-repo/imex-bot:$SHORT_SHA",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "europe-west1-docker.pkg.dev/imexassist-bot/imex-repo/imex-bot:$SHORT_SHA",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "imexassist-bot",
        "--image",
        "europe-west1-docker.pkg.dev/imexassist-bot/imex-repo/imex-bot:$SHORT_SHA",
        "--region",
        "europe-west1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
      ]

images:
  - "europe-west1-docker.pkg.dev/imexassist-bot/imex-repo/imex-bot:$SHORT_SHA"

  options:
  logging: CLOUD_LOGGING_ONLY
